<!DOCTYPE html>
<html>
<head>
    <title>Good First Issues</title>

    <!-- PapaParse library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            font-size: 14px;
            text-align: left;
        }

        th {
            background-color: #f4f4f4;
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        a {
            color: blue;
        }
    </style>
</head>

<body>

<h1>Good First Issues</h1>

<input type="text" id="searchBox" placeholder="Search issues...">

<select id="languageFilter">
    <option value="">All languages</option>
</select>

<button id="sortComments">
    Sort by comments
</button>

<table id="issuesTable"></table>

<script>
    let issuesData = []
    let currentSearch = "";
    let currentLanguage = "";
    let sortMode = 0;
    let colIdx = {};
    /* 
        0 = DEFAULT
        1 = DESCENDING
        2 = ASCENDING
    */

    const $ = (id) => document.getElementById(id);
    const searchBox = $("searchBox");
    const languageFilter = $("languageFilter");
    const sortComments = $("sortComments");
    const table = $("issuesTable");

    function renderTable(data) {

        table.innerHTML = "";

        data.forEach((row, index) => {
            const tr = document.createElement("tr");

            row.forEach(col => {
                const cell = document.createElement(index === 0 ? "th" : "td")

                if (typeof col === "string" && col.startsWith("http")) {
                const a = document.createElement("a");

                a.href = col;
                a.innerText = "Open Issue";
                a.target = "_blank";

                cell.appendChild(a);
            } else {
                cell.innerText = col;
            }
            tr.appendChild(cell);
            });

            table.appendChild(tr);  
        });
        
    }

    function updateTable() {

        const header = issuesData[0];
        let rows = issuesData.slice(1);

        if (currentSearch !== "") {
            rows = rows.filter(row => {
                return row.join(" ").toLowerCase().includes(currentSearch.toLowerCase())
            });
        }
        
        if (currentLanguage !== "") {
            rows = rows.filter(row => {
                return row[colIdx.language] === currentLanguage
            });
        }

        if (sortMode === 1) {
            rows.sort(
                (a,b) => Number(b[colIdx.comments]) - Number(a[colIdx.comments])
            );
        } else if (sortMode === 2) {
            rows.sort(
                (a,b) => Number(a[colIdx.comments]) - Number(b[colIdx.comments])
            );
        }

        renderTable([header, ...rows]);
    }

    searchBox.addEventListener("input", () => {
        currentSearch = searchBox.value;

         updateTable();
    });
    
    languageFilter.addEventListener("change", () => {
        currentLanguage = languageFilter.value;

        updateTable();
    })

    sortComments.addEventListener("click", () => {
        sortMode = (sortMode +1) % 3;

        switch (sortMode) {
            case 0:
                sortComments.textContent = "Sort by comments";
                break;

            case 1:
                sortComments.textContent = "Comments Descending"
                break;
            case 2:
                sortComments.textContent = "Comments Ascending"
                break;
        }

        updateTable();
    })
    
    fetch("/good_first_issues.csv")
        .then(response => response.text())
        .then(csvText => {

            Papa.parse(csvText, {
                skipEmptyLines: true,
                complete: function(results) {
                    issuesData = results.data;
                    const header = issuesData[0];
                    colIdx = {
                        language: header.indexOf("language"),
                        comments: header.indexOf("comments")
                    };

                    const languages = [
                        ...new Set(
                            issuesData.slice(1).map(row => row[colIdx.language])
                        )
                    ];

                    languages.forEach(lang => {
                        const option = document.createElement("option");

                        option.value = lang;
                        option.textContent = lang;

                        languageFilter.appendChild(option);
                    });

                    renderTable(issuesData)
                }
            });
        })
        .catch(err => {
            console.error("Error loading CSV:", err);
        });
</script>

</body>
</html>
