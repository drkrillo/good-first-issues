<!DOCTYPE html>
<html>
<head>
    <title>Good First Issues</title>

    <!-- PapaParse library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <style>
        :root {
            --bg: #ffffff;
            --text: #1a1a2e;
            --accent: #4361ee;
            --accent-hover: #3a56d4;
            --border: #e0e0e0;
            --header-bg: #f0f2ff;
            --row-hover: #f8f9ff;
            --input-bg: #ffffff;
            --input-border: #d0d0d0;
            --card-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f0f23;
                --text: #e0e0f0;
                --accent: #6c8cff;
                --accent-hover: #5a7aee;
                --border: #2a2a4a;
                --header-bg: #1a1a3e;
                --row-hover: #1a1a3e;
                --input-bg: #1a1a3e;
                --input-border: #3a3a5a;
                --card-shadow: 0 2px 12px rgba(0,0,0,0.4);
            }
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 24px 16px;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0 0 24px;
            color: var(--accent);
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            align-items: center;
        }

        #searchBox {
            flex: 1 1 260px;
            padding: 10px 14px;
            font-size: 14px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            background: var(--input-bg);
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #searchBox:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.15);
        }

        #languageFilter {
            padding: 10px 14px;
            font-size: 14px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            background: var(--input-bg);
            color: var(--text);
            outline: none;
            cursor: pointer;
            min-width: 160px;
            transition: border-color 0.2s;
        }

        #languageFilter:focus {
            border-color: var(--accent);
        }

        #sortComments {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: #ffffff;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        #sortComments:hover {
            background: var(--accent-hover);
        }

        #sortComments:active {
            transform: scale(0.97);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
        }

        th, td {
            border: none;
            border-bottom: 1px solid var(--border);
            padding: 12px 14px;
            font-size: 14px;
            text-align: left;
        }

        th {
            background: var(--header-bg);
            font-weight: 600;
            color: var(--accent);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: var(--row-hover);
        }

        a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: text-decoration 0.2s;
        }

        a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            body {
                padding: 16px 8px;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            #searchBox, #languageFilter, #sortComments {
                width: 100%;
            }

            th, td {
                padding: 8px 10px;
                font-size: 13px;
            }

            h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>

<body>

<div class="container">

<h1>Good First Issues</h1>

<div class="controls">
<input type="text" id="searchBox" placeholder="Search issues...">

<select id="languageFilter">
    <option value="">All languages</option>
</select>

<button id="sortComments">
    Sort by comments
</button>
</div>

<table id="issuesTable"></table>

<script>
    let issuesData = []
    let currentSearch = "";
    let currentLanguage = "";
    let sortMode = 0;
    /* 
        0 = DEFAULT
        1 = DESCENDING
        2 = ASCENDING
    */

    const $ = (id) => document.getElementById(id);
    const searchBox = $("searchBox");
    const languageFilter = $("languageFilter");
    const sortComments = $("sortComments");
    const table = $("issuesTable");

    // Resolve column name to index from the header row
    function getColumnIndex(header, name) {
        return header.findIndex(col => col.trim().toLowerCase() === name.toLowerCase());
    }

    function renderTable(data) {

        table.innerHTML = "";

        data.forEach((row, index) => {
            const tr = document.createElement("tr");

            row.forEach(col => {
                const cell = document.createElement(index === 0 ? "th" : "td")

                if (typeof col === "string" && col.startsWith("http")) {
                const a = document.createElement("a");

                a.href = col;
                a.innerText = "Open Issue";
                a.target = "_blank";

                cell.appendChild(a);
            } else {
                cell.innerText = col;
            }
            tr.appendChild(cell);
            });

            table.appendChild(tr);  
        });
        
    }

    function updateTable() {

        const header = issuesData[0];
        const langIdx = getColumnIndex(header, "language");
        const commentsIdx = getColumnIndex(header, "comments");
        const rows = issuesData.slice(1);

        let filtered = rows;

        if (currentSearch !== "") {
            filtered = filtered.filter(row => {
                return row.join(" ").toLowerCase().includes(currentSearch.toLowerCase())
            });
        }
        
        if (currentLanguage !== "" && langIdx !== -1) {
            filtered = filtered.filter(row => {
                return row[langIdx] === currentLanguage
            });
        }

        if (sortMode === 1 && commentsIdx !== -1) {
            filtered.sort(
                (a,b) => Number(b[commentsIdx]) - Number(a[commentsIdx])
            );
        } else if (sortMode === 2 && commentsIdx !== -1) {
            filtered.sort(
                (a,b) => Number(a[commentsIdx]) - Number(b[commentsIdx])
            );
        }

        renderTable([header, ...filtered]);
    }

    searchBox.addEventListener("input", () => {
        currentSearch = searchBox.value;

         updateTable();
    });
    
    languageFilter.addEventListener("change", () => {
        currentLanguage = languageFilter.value;

        updateTable();
    })

    sortComments.addEventListener("click", () => {
        sortMode = (sortMode +1) % 3;

        switch (sortMode) {
            case 0:
                sortComments.textContent = "Sort by comments";
                break;

            case 1:
                sortComments.textContent = "Comments Descending"
                break;
            case 2:
                sortComments.textContent = "Comments Ascending"
                break;
        }

        updateTable();
    })
    
    fetch("/good_first_issues.csv")
        .then(response => response.text())
        .then(csvText => {

            Papa.parse(csvText, {
                skipEmptyLines: true,
                complete: function(results) {
                    issuesData = results.data;
                    const header = issuesData[0];
                    const langIdx = getColumnIndex(header, "language");

                    const languages = [
                        ...new Set(
                            issuesData.slice(1).map(row => langIdx !== -1 ? row[langIdx] : "")
                        )
                    ];

                    languages.forEach(lang => {
                        const option = document.createElement("option");

                        option.value = lang;
                        option.textContent = lang;

                        languageFilter.appendChild(option);
                    });

                    renderTable(issuesData)
                }
            });
        })
        .catch(err => {
            console.error("Error loading CSV:", err);
        });
</script>

</body>
</html>
